<!DOCTYPE html>
{% extends 'dashboard.html' %}
{% block content %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div class="col-lg-12 grid-margin stretch-card">
                <div class="card">
                  <div class="card-body">
                    <h4 class="card-title text-center">Contact Details</h4>
                    </p>
                    <div class="table-responsive">
                      <table class="table table-bordered">
                        <thead>
                          <tr>
                            <th>Name</th>
                            <th> Email </th>
                            <th> Contact </th>
                            <th> Subject </th>
                            <th> Message </th>
                            <th>Options</th>
                          </tr>
                        </thead>
                          {% for i in contacts %}
                        <tbody>
                        <tr>
                            <td>{{i.Name}}</td>
                            <td>{{i.Email}}</td>
                            <td>{{i.Mobile}}</td>
                            <td>{{i.Subject}}</td>
                            <td>{{i.Message}}</td>
                            <td>
                                <a href=" {% url 'delete_contact' con_id=i.id %} ">
                                    <button type="submit" class="btn btn-danger mr-2">Delete</button>
                                </a>
                            </td>
                        </tr>
                        </tbody>
                          {% endfor %}
                      </table>
                    </div>
                  </div>
                </div>
              </div>
</body>
</html>
{% endblock %}
