
<!doctype html>
{% load static %}
<html lang="en">
  <head>
  	<title>Login 05</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

	<link href="https://fonts.googleapis.com/css?family=Lato:300,400,700&display=swap" rel="stylesheet">

	<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">

	<link rel="stylesheet" href="{% static 'login/css/style.css' %}">

	</head>
	<body>
	<section class="ftco-section">
		<div class="container">

			<div class="row justify-content-center">
				<div class="col-md-7 col-lg-5">
					<div class="wrap">
						<div class="img" style="background-image: url({% static 'login/images/bg-1.jpg' %});"></div>
						<div class="login-wrap p-4 p-md-5">
			      	<div class="d-flex">
			      		<div class="w-100">
			      			<h3 class="mb-4">Sign In</h3>
			      		</div>

			      	</div>
							<form action="{% url 'admin_login' %}" method="post" class="signin-form">
                                {% csrf_token %}
			      		<div class="form-group mt-3">
			      			<input type="text" class="form-control" id="username" name="username" required>
			      			<label class="form-control-placeholder" for="username">Username</label>
			      		</div>
		            <div class="form-group">
		              <input id="password-field" name="password" type="password"  class="form-control" required>
		              <label class="form-control-placeholder"  for="password-field">Password</label>
		              <span toggle="#password-field" class="fa fa-fw fa-eye field-icon toggle-password"></span>
		            </div>
		            <div class="form-group">
		            	<button type="submit" class="form-control btn btn-primary rounded submit px-3">Sign In</button>
		            </div>

		          </form>
		        </div>
		      </div>
				</div>
			</div>
		</div>
	</section>

	<script src="{% static 'login/js/jquery.min.js' %}"></script>
  <script src="{% static 'login/js/popper.js' %}"></script>
  <script src="{% static 'login/js/bootstrap.min.js' %}"></script>
  <script src="{% static 'login/js/main.js' %}"></script>
       <script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
        {% if messages %}
            {% for i in messages %}
                {% if i.tags == 'success' %}
                    <script>
                        swal('{{i}}','','success')
                    </script>

                {% elif i.tags == 'error' %}
                    <script>
                        swal('{{i}}','','error')
                    </script>
                {% elif i.tags == 'warning' %}
                    <script>
                        swal('{{i}}','','warning')
                    </script>
                {% elif i.tags == 'info' %}
                    <script>
                        swal('{{i}}','','info')
                    </script>
                {% endif %}
            {% endfor %}
        {% endif %}

	</body>
</html>
